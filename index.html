<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Lupo Studio">
  <title>Lido Lupo Studio</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    window.exports = {}; window.module = { exports: {} };
    const { useState, useRef, useEffect } = React;
    const createIcon = (name) => ({ size=24, className='', color='currentColor', strokeWidth=2, ...props }) => {
      const d = lucide[name]; if (!d) return React.createElement('span', { className }, name);
      const rc = (items) => items ? items.map(([t, a, c], i) => React.createElement(t, { key: i, ...a }, c ? rc(c) : null)) : null;
      return React.createElement('svg', { xmlns: 'http://www.w3.org/2000/svg', width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round', className, ...props }, rc(d));
    };
    const Instagram = createIcon('Instagram');
    const Send = createIcon('Send');
    const Sparkles = createIcon('Sparkles');
    const Copy = createIcon('Copy');
    const CheckCircle2 = createIcon('CheckCircle2');
    const RefreshCcw = createIcon('RefreshCcw');
    const Camera = createIcon('Camera');
    const Utensils = createIcon('Utensils');
    const Calendar = createIcon('Calendar');
    const Users = createIcon('Users');
    const Upload = createIcon('Upload');
    const ImageIcon = createIcon('Image');
    const Zap = createIcon('Zap');
    const Eye = createIcon('Eye');
    const Plus = createIcon('Plus');
    const Clock = createIcon('Clock');
    const ChevronLeft = createIcon('ChevronLeft');
    const ChevronRight = createIcon('ChevronRight');
    const AlertCircle = createIcon('AlertCircle');
    const Waves = createIcon('Waves');

const App = () => {
  // --- View State ---
  const [activeTab, setActiveTab] = useState('instagram');
  
  // --- Generation State ---
  const [platform, setPlatform] = useState('instagram');
  const [theme, setTheme] = useState('menu');
  const [vibe, setVibe] = useState(50);
  const [topic, setTopic] = useState('');
  const [isGenerating, setIsGenerating] = useState(false);
  const [generatedPost, setGeneratedPost] = useState(null);
  const [copied, setCopied] = useState(false);

  // --- Image & Vision State ---
  const [selectedImage, setSelectedImage] = useState(null);
  const [base64Image, setBase64Image] = useState(null);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [imageAnalysis, setImageAnalysis] = useState(null);
  const fileInputRef = useRef(null);

  // --- Instagram Dummy State ---
  const [igPosts, setIgPosts] = useState([
    { id: 1, color: 'bg-cyan-400', emoji: '🍝', caption: 'Pasta al Lupo – unser Signature Dish', type: 'food' },
    { id: 2, color: 'bg-amber-300', emoji: '☀️', caption: 'Sonnenuntergang von der Terrasse', type: 'mood' },
    { id: 3, color: 'bg-emerald-400', emoji: '🥗', caption: 'Frische Salate, direkt aus dem Garten', type: 'food' },
    { id: 4, color: 'bg-rose-400', emoji: '🍷', caption: 'Weinabend am See – jeden Donnerstag', type: 'event' },
    { id: 5, color: 'bg-indigo-400', emoji: '🌊', caption: 'Der See ruft! Badi-Vibes pur', type: 'mood' },
    { id: 6, color: 'bg-yellow-400', emoji: '🐺', caption: 'Lupo grüsst! Neues Menü ab Freitag', type: 'promo' },
    { id: 7, color: 'bg-teal-400', emoji: '🍹', caption: 'Aperol o\'clock – Cheers!', type: 'food' },
    { id: 8, color: 'bg-pink-400', emoji: '🎶', caption: 'Live Music Samstag ab 18 Uhr', type: 'event' },
    { id: 9, color: 'bg-orange-400', emoji: '🔥', caption: 'Grill-Special: Dry Aged Burger', type: 'food' },
  ]);
  const [igSelectedPost, setIgSelectedPost] = useState(null);
  const [igEditCaption, setIgEditCaption] = useState('');
  const [igDragIdx, setIgDragIdx] = useState(null);
  const [igDragOverIdx, setIgDragOverIdx] = useState(null);
  const [igShowAddModal, setIgShowAddModal] = useState(false);
  const [igNewEmoji, setIgNewEmoji] = useState('📸');
  const [igNewCaption, setIgNewCaption] = useState('');
  const [igNewColor, setIgNewColor] = useState('bg-slate-400');
  const [igNewType, setIgNewType] = useState('mood');
  const [igUploadedImages, setIgUploadedImages] = useState({});
  const igFileRef = useRef(null);
  const [igUploadForId, setIgUploadForId] = useState(null);

  const igHandleDragStart = (idx) => setIgDragIdx(idx);
  const igHandleDragOver = (e, idx) => { e.preventDefault(); setIgDragOverIdx(idx); };
  const igHandleDrop = (idx) => {
    if (igDragIdx === null || igDragIdx === idx) { setIgDragIdx(null); setIgDragOverIdx(null); return; }
    const updated = [...igPosts];
    const [moved] = updated.splice(igDragIdx, 1);
    updated.splice(idx, 0, moved);
    setIgPosts(updated);
    setIgDragIdx(null);
    setIgDragOverIdx(null);
  };
  const igAddPost = () => {
    if (!igNewCaption.trim()) return;
    setIgPosts(prev => [{ id: Date.now(), color: igNewColor, emoji: igNewEmoji, caption: igNewCaption, type: igNewType }, ...prev]);
    setIgNewEmoji('📸'); setIgNewCaption(''); setIgNewColor('bg-slate-400'); setIgNewType('mood');
    setIgShowAddModal(false);
  };
  const igDeletePost = (id) => { setIgPosts(prev => prev.filter(p => p.id !== id)); setIgSelectedPost(null); };
  const igSaveCaption = () => {
    setIgPosts(prev => prev.map(p => p.id === igSelectedPost.id ? { ...p, caption: igEditCaption } : p));
    setIgSelectedPost(prev => ({ ...prev, caption: igEditCaption }));
  };
  const igHandleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file || !igUploadForId) return;
    const reader = new FileReader();
    reader.onloadend = () => {
      setIgUploadedImages(prev => ({ ...prev, [igUploadForId]: reader.result }));
      setIgUploadForId(null);
    };
    reader.readAsDataURL(file);
  };

  const igTypeColors = { food: 'text-orange-500', mood: 'text-cyan-500', event: 'text-purple-500', promo: 'text-yellow-600' };
  const igColorOptions = ['bg-cyan-400','bg-amber-300','bg-emerald-400','bg-rose-400','bg-indigo-400','bg-yellow-400','bg-teal-400','bg-pink-400','bg-orange-400','bg-slate-400','bg-violet-400','bg-lime-400'];
  const igEmojiOptions = ['📸','🍝','☀️','🥗','🍷','🌊','🐺','🍹','🎶','🔥','🏖️','🎉','🍕','💫','🌅','🧀'];

  // --- Calendar State ---
  const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1)); // März 2026
  const [events, setEvents] = useState([
    { id: 1, date: '2026-03-28', title: 'Saison Opening', type: 'event', color: 'bg-yellow-400' },
    { id: 2, date: '2026-03-29', title: 'Insta: Opening Post', type: 'social', color: 'bg-cyan-500' },
    { id: 3, date: '2026-04-01', title: 'Knusperli-Woche', type: 'menu', color: 'bg-purple-400' }
  ]);
  const [isGeneratingSchedule, setIsGeneratingSchedule] = useState(false);

  const apiKey = ""; // Runtime provides the key

  // --- Calendar Logic ---
  const getCalendarMeta = (date) => {
    const year = date.getFullYear();
    const month = date.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDayIndex = new Date(year, month, 1).getDay();
    // Start with Monday (0=Mon, 6=Sun)
    const offset = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
    return { daysInMonth, offset };
  };

  const { daysInMonth, offset } = getCalendarMeta(currentDate);
  const monthNames = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];

  const changeMonth = (delta) => {
    setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + delta, 1));
  };

  // --- API Methods ---
  const handleImageUpload = (event) => {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => {
        setSelectedImage(reader.result);
        setBase64Image(reader.result.split(',')[1]);
        setImageAnalysis(null);
      };
      reader.readAsDataURL(file);
    }
  };

  const analyzeImage = async () => {
    if (!base64Image) return;
    setIsAnalyzing(true);
    const systemPrompt = "Du bist Creative Designer für 'Lido Lupo'. Analysiere das Bild für Marketing-Zwecke.";
    const userQuery = "Analysiere das Bild und gib JSON zurück: description, suggestions (array), aiPrompt.";
    
    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: "user", parts: [{ text: userQuery }, { inlineData: { mimeType: "image/png", data: base64Image } }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] },
          generationConfig: { 
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                description: { type: "STRING" },
                suggestions: { type: "ARRAY", items: { type: "STRING" } },
                aiPrompt: { type: "STRING" }
              }
            }
          }
        })
      });
      const data = await response.json();
      setImageAnalysis(JSON.parse(data.candidates[0].content.parts[0].text));
    } catch (err) {
      console.error(err);
    } finally {
      setIsAnalyzing(false);
    }
  };

  const generateText = async () => {
    setIsGenerating(true);
    const systemPrompt = `Du bist Creative Designer für das Badi-Restaurant "Lido Lupo". Vibe: ${vibe}/100 Wolf. Plattform: ${platform}.`;
    const userQuery = `Thema: ${theme}. Details: ${topic}. ${imageAnalysis ? 'Beziehe dich auf: ' + imageAnalysis.description : ''}`;
    
    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: userQuery }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] },
          generationConfig: { 
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                caption: { type: "STRING" },
                hashtags: { type: "ARRAY", items: { type: "STRING" } }
              }
            }
          }
        })
      });
      const data = await response.json();
      setGeneratedPost(JSON.parse(data.candidates[0].content.parts[0].text));
    } catch (err) {
      console.error(err);
    } finally {
      setIsGenerating(false);
    }
  };

  const copyToClipboard = (text) => {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div className="min-h-screen bg-slate-50 text-slate-900 font-sans flex flex-col">
      
      {/* Top Header (Mobile) */}
      <header className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 p-4 flex justify-between items-center md:pl-24">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 bg-yellow-400 rounded-lg flex items-center justify-center font-bold shadow-sm">🐺</div>
          <h1 className="text-lg font-black italic tracking-tighter">LIDO LUPO STUDIO</h1>
        </div>
        <div className="text-[10px] font-black text-cyan-600 bg-cyan-50 px-2 py-1 rounded-full uppercase tracking-widest">v5.1 Stable</div>
      </header>

      {/* Main Content Area */}
      <main className="flex-1 overflow-y-auto pb-24 md:pb-0 md:pl-24 p-4 lg:p-10 max-w-5xl mx-auto w-full">
        
        {activeTab === 'instagram' ? (
          /* Instagram Dummy View */
          <div className="space-y-4">
            {/* Hidden file input for post images */}
            <input type="file" ref={igFileRef} onChange={igHandleImageUpload} className="hidden" accept="image/*" />

            {/* Profile Header */}
            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
              <div className="flex items-center gap-5">
                <div className="w-20 h-20 rounded-full bg-gradient-to-br from-yellow-400 via-pink-500 to-purple-600 p-[3px] flex-shrink-0">
                  <div className="w-full h-full bg-white rounded-full flex items-center justify-center text-3xl">🐺</div>
                </div>
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-1">
                    <h2 className="text-base font-black">lidolupo_badi</h2>
                    <span className="text-[9px] bg-cyan-500 text-white px-2 py-0.5 rounded-full font-bold">✓</span>
                  </div>
                  <p className="text-xs text-slate-500 leading-relaxed">🐺 Badi-Restaurant am See<br/>🍝 Frische Küche & gute Vibes<br/>📍 Zürich · Mo–So 10–22</p>
                </div>
              </div>
              <div className="flex justify-around mt-5 pt-4 border-t border-slate-100">
                <div className="text-center"><span className="text-lg font-black">{igPosts.length}</span><br/><span className="text-[9px] text-slate-400 font-bold uppercase">Beiträge</span></div>
                <div className="text-center"><span className="text-lg font-black">2.4k</span><br/><span className="text-[9px] text-slate-400 font-bold uppercase">Follower</span></div>
                <div className="text-center"><span className="text-lg font-black">186</span><br/><span className="text-[9px] text-slate-400 font-bold uppercase">Folge ich</span></div>
              </div>
            </div>

            {/* Story Highlights */}
            <div className="flex gap-4 overflow-x-auto pb-1 px-1 no-scrollbar">
              {[{e:'🍽️',l:'Menü'},{e:'🌅',l:'Sunsets'},{e:'🎉',l:'Events'},{e:'📸',l:'Behind'},{e:'🐺',l:'Lupo'}].map((s,i) => (
                <div key={i} className="flex flex-col items-center gap-1 flex-shrink-0">
                  <div className="w-16 h-16 rounded-full bg-gradient-to-br from-yellow-400 via-pink-500 to-purple-600 p-[2px]">
                    <div className="w-full h-full bg-white rounded-full flex items-center justify-center text-xl">{s.e}</div>
                  </div>
                  <span className="text-[9px] font-bold text-slate-500">{s.l}</span>
                </div>
              ))}
              <div className="flex flex-col items-center gap-1 flex-shrink-0">
                <div className="w-16 h-16 rounded-full border-2 border-dashed border-slate-200 flex items-center justify-center">
                  <Plus size={20} className="text-slate-300" />
                </div>
                <span className="text-[9px] font-bold text-slate-300">Neu</span>
              </div>
            </div>

            {/* Grid Controls */}
            <div className="flex items-center justify-between px-1">
              <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
                <ImageIcon size={12} /> Feed-Komposition
              </h3>
              <button onClick={() => setIgShowAddModal(true)} className="flex items-center gap-1 bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider hover:bg-cyan-600 transition-all active:scale-95">
                <Plus size={12} /> Beitrag
              </button>
            </div>

            {/* Post Grid (Instagram 3-column) */}
            <div className="grid grid-cols-3 gap-1 rounded-2xl overflow-hidden">
              {igPosts.map((post, idx) => (
                <div
                  key={post.id}
                  draggable
                  onDragStart={() => igHandleDragStart(idx)}
                  onDragOver={(e) => igHandleDragOver(e, idx)}
                  onDrop={() => igHandleDrop(idx)}
                  onDragEnd={() => { setIgDragIdx(null); setIgDragOverIdx(null); }}
                  onClick={() => { setIgSelectedPost(post); setIgEditCaption(post.caption); }}
                  className={`aspect-square relative cursor-pointer transition-all overflow-hidden ${igDragOverIdx === idx ? 'ring-4 ring-cyan-400 scale-95' : ''} ${igDragIdx === idx ? 'opacity-40' : ''}`}
                >
                  {igUploadedImages[post.id] ? (
                    <img src={igUploadedImages[post.id]} alt="" className="w-full h-full object-cover" />
                  ) : (
                    <div className={`w-full h-full ${post.color} flex items-center justify-center`}>
                      <span className="text-4xl drop-shadow-md">{post.emoji}</span>
                    </div>
                  )}
                  <div className="absolute inset-0 bg-black/0 hover:bg-black/30 transition-all flex items-center justify-center opacity-0 hover:opacity-100">
                    <span className="text-white text-[9px] font-bold uppercase tracking-wider px-2 text-center">{post.type}</span>
                  </div>
                  {/* Row indicator lines every 3 posts */}
                  {idx % 3 === 0 && idx > 0 && (
                    <div className="absolute top-0 left-0 right-0 h-[1px] bg-white"></div>
                  )}
                </div>
              ))}
            </div>

            {/* Composition Tips */}
            <div className="bg-indigo-50 rounded-2xl p-4 border border-indigo-100">
              <p className="text-[10px] font-black uppercase tracking-widest text-indigo-400 mb-2">💡 Kompositions-Tipps</p>
              <ul className="text-xs text-indigo-700 space-y-1">
                <li>{"• Ziehe Beiträge per Drag & Drop um die Reihenfolge zu ändern"}</li>
                <li>{"• Achte auf Farb-Abwechslung in jeder 3er-Reihe"}</li>
                <li>{"• Mische Content-Typen: Food, Mood, Events, Promo"}</li>
                <li>{"• Klicke auf einen Beitrag für Details & Bildupload"}</li>
              </ul>
            </div>

            {/* Post Detail Modal */}
            {igSelectedPost && (
              <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4" onClick={() => setIgSelectedPost(null)}>
                <div className="bg-white rounded-[2rem] w-full max-w-md overflow-hidden shadow-2xl animate-in slide-in-from-bottom-4" onClick={e => e.stopPropagation()}>
                  {/* Post Image Area */}
                  <div className="relative">
                    {igUploadedImages[igSelectedPost.id] ? (
                      <img src={igUploadedImages[igSelectedPost.id]} alt="" className="w-full aspect-square object-cover" />
                    ) : (
                      <div className={`w-full aspect-square ${igSelectedPost.color} flex items-center justify-center`}>
                        <span className="text-8xl drop-shadow-lg">{igSelectedPost.emoji}</span>
                      </div>
                    )}
                    <button
                      onClick={() => { setIgUploadForId(igSelectedPost.id); setTimeout(() => igFileRef.current?.click(), 50); }}
                      className="absolute bottom-4 right-4 bg-white/90 backdrop-blur px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-1 shadow-lg hover:bg-white transition-all"
                    >
                      <Camera size={14} /> Foto laden
                    </button>
                  </div>
                  {/* Post Details */}
                  <div className="p-6 space-y-4">
                    <div className="flex items-center gap-3">
                      <div className="w-8 h-8 bg-yellow-400 rounded-full flex items-center justify-center text-sm">🐺</div>
                      <span className="text-sm font-black">lidolupo_badi</span>
                      <span className={`text-[9px] font-black uppercase ${igTypeColors[igSelectedPost.type] || 'text-slate-400'} bg-slate-50 px-2 py-1 rounded-full`}>{igSelectedPost.type}</span>
                    </div>
                    <textarea
                      value={igEditCaption}
                      onChange={e => setIgEditCaption(e.target.value)}
                      className="w-full p-3 bg-slate-50 rounded-xl text-sm resize-none h-24 outline-none focus:ring-2 focus:ring-cyan-500/20"
                      placeholder="Caption eingeben..."
                    />
                    <div className="flex gap-2">
                      <button onClick={igSaveCaption} className="flex-1 py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-cyan-600 transition-all">Speichern</button>
                      <button onClick={() => igDeletePost(igSelectedPost.id)} className="py-3 px-5 bg-red-50 text-red-500 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-100 transition-all">Löschen</button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Add Post Modal */}
            {igShowAddModal && (
              <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4" onClick={() => setIgShowAddModal(false)}>
                <div className="bg-white rounded-[2rem] w-full max-w-md p-6 shadow-2xl animate-in slide-in-from-bottom-4 space-y-4" onClick={e => e.stopPropagation()}>
                  <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400">Neuer Beitrag</h3>

                  {/* Emoji Picker */}
                  <div>
                    <p className="text-[9px] font-bold text-slate-400 uppercase mb-2">Platzhalter-Emoji</p>
                    <div className="flex flex-wrap gap-2">
                      {igEmojiOptions.map(em => (
                        <button key={em} onClick={() => setIgNewEmoji(em)} className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg transition-all ${igNewEmoji === em ? 'bg-slate-900 scale-110 shadow-lg' : 'bg-slate-50 hover:bg-slate-100'}`}>{em}</button>
                      ))}
                    </div>
                  </div>

                  {/* Color Picker */}
                  <div>
                    <p className="text-[9px] font-bold text-slate-400 uppercase mb-2">Hintergrund</p>
                    <div className="flex flex-wrap gap-2">
                      {igColorOptions.map(c => (
                        <button key={c} onClick={() => setIgNewColor(c)} className={`w-8 h-8 rounded-full ${c} transition-all ${igNewColor === c ? 'ring-4 ring-slate-900 ring-offset-2 scale-110' : ''}`} />
                      ))}
                    </div>
                  </div>

                  {/* Type */}
                  <div>
                    <p className="text-[9px] font-bold text-slate-400 uppercase mb-2">Content-Typ</p>
                    <div className="flex gap-1 p-1 bg-slate-50 rounded-xl">
                      {['food','mood','event','promo'].map(t => (
                        <button key={t} onClick={() => setIgNewType(t)} className={`flex-1 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${igNewType === t ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400'}`}>{t}</button>
                      ))}
                    </div>
                  </div>

                  {/* Caption */}
                  <textarea
                    value={igNewCaption}
                    onChange={e => setIgNewCaption(e.target.value)}
                    className="w-full p-4 bg-slate-50 rounded-xl text-sm resize-none h-24 outline-none focus:ring-2 focus:ring-cyan-500/20"
                    placeholder="Caption für den Beitrag..."
                  />

                  {/* Preview */}
                  <div className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl">
                    <div className={`w-14 h-14 ${igNewColor} rounded-lg flex items-center justify-center text-2xl flex-shrink-0`}>{igNewEmoji}</div>
                    <p className="text-xs text-slate-500 italic truncate">{igNewCaption || 'Vorschau...'}</p>
                  </div>

                  <button onClick={igAddPost} disabled={!igNewCaption.trim()} className="w-full py-4 bg-yellow-400 rounded-2xl font-black uppercase tracking-widest text-sm flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                    <Plus size={16} /> Hinzufügen
                  </button>
                </div>
              </div>
            )}
          </div>
        ) : activeTab === 'generator' ? (
          <div className="space-y-6">
            
            {/* Image Lab Card */}
            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
               <div className="flex justify-between items-center mb-4">
                  <h2 className="text-[10px] font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
                    <Camera size={14} className="text-cyan-500" /> Image Intelligence
                  </h2>
               </div>
               
               <div 
                 onClick={() => fileInputRef.current.click()}
                 className={`relative h-48 rounded-3xl border-4 border-dashed transition-all cursor-pointer flex flex-col items-center justify-center overflow-hidden ${selectedImage ? 'border-cyan-500 bg-white' : 'border-slate-100 bg-slate-50'}`}
               >
                 {selectedImage ? (
                   <img src={selectedImage} alt="Preview" className="w-full h-full object-cover" />
                 ) : (
                   <div className="text-center">
                     <Upload size={24} className="mx-auto mb-2 text-slate-300" />
                     <p className="text-[10px] font-black uppercase text-slate-400">Foto wählen / aufnehmen</p>
                   </div>
                 )}
                 <input type="file" ref={fileInputRef} onChange={handleImageUpload} className="hidden" accept="image/*" />
               </div>

               {selectedImage && (
                 <div className="mt-4 flex gap-2">
                    <button 
                      onClick={analyzeImage} 
                      disabled={isAnalyzing}
                      className="flex-1 py-3 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-cyan-600 active:scale-95 transition-all"
                    >
                      {isAnalyzing ? <RefreshCcw size={14} className="animate-spin" /> : <Eye size={14} />}
                      {isAnalyzing ? 'Analysiere...' : 'Bild-Analyse'}
                    </button>
                    <button onClick={() => setSelectedImage(null)} className="p-3 bg-red-50 text-red-400 rounded-2xl">
                      <RefreshCcw size={14} />
                    </button>
                 </div>
               )}

               {imageAnalysis && (
                 <div className="mt-4 p-4 bg-cyan-50 rounded-2xl border border-cyan-100 animate-in fade-in">
                    <p className="text-[10px] font-bold text-cyan-700 uppercase mb-2 italic">Strategie-Tipp:</p>
                    <p className="text-xs text-cyan-900 leading-relaxed italic">"{imageAnalysis.suggestions[0]}"</p>
                 </div>
               )}
            </div>

            {/* Post Generator Card */}
            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 space-y-4">
              <h2 className="text-[10px] font-black uppercase tracking-widest text-slate-400">Content Engine</h2>
              
              <div className="flex gap-1 p-1 bg-slate-50 rounded-2xl">
                {['instagram', 'tiktok', 'newsletter'].map(p => (
                  <button key={p} onClick={() => setPlatform(p)} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${platform === p ? 'bg-white text-slate-900 shadow-sm border border-slate-100' : 'text-slate-400'}`}>
                    {p}
                  </button>
                ))}
              </div>

              <div className="space-y-2">
                <div className="flex justify-between text-[9px] font-black uppercase text-slate-400">
                  <span>Vibe: Elegant</span>
                  <span>Wilder Wolf</span>
                </div>
                <input type="range" value={vibe} onChange={(e) => setVibe(e.target.value)} className="w-full accent-cyan-500 h-1 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
              </div>

              <textarea 
                value={topic}
                onChange={(e) => setTopic(e.target.value)}
                placeholder="Worüber schreiben wir? (z.B. Schnitzel-Tag, Sonnenuntergang...)"
                className="w-full p-5 bg-slate-50 border-none rounded-2xl text-sm h-32 focus:ring-2 focus:ring-cyan-500/10 outline-none resize-none"
              />

              <button 
                onClick={generateText} 
                disabled={isGenerating}
                className="w-full py-5 bg-yellow-400 rounded-3xl font-black uppercase tracking-widest text-sm shadow-xl shadow-yellow-100 flex items-center justify-center gap-3 active:scale-95 transition-all"
              >
                {isGenerating ? <RefreshCcw size={20} className="animate-spin" /> : <Sparkles size={20} />}
                {isGenerating ? 'Lupo textet...' : 'Post erstellen'}
              </button>
            </div>

            {/* Result Display */}
            {generatedPost && (
              <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl animate-in slide-in-from-bottom-4">
                <div className="flex justify-between items-center mb-6">
                  <div className="flex items-center gap-2">
                    <Zap size={14} className="text-yellow-400" />
                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Vorschau</span>
                  </div>
                  <button onClick={() => copyToClipboard(generatedPost.caption)} className="p-3 bg-white/10 rounded-2xl active:bg-white/20">
                    {copied ? <CheckCircle2 size={18} className="text-green-400" /> : <Copy size={18} />}
                  </button>
                </div>
                <p className="text-lg leading-relaxed italic mb-8">"{generatedPost.caption}"</p>
                <div className="flex flex-wrap gap-2a">
                  {generatedPost.hashtags.map((h, i) => <span key={i} className="text-cyan-400 text-xs font-bold bg-cyan-400/10 px-3 py-1 rounded-full">#{h}</span>)}
                </div>
              </div>
            )}
          </div>
        ) : (
          /* Calendar View */
          <div className="space-y-6 animate-in fade-in duration-300">
            <div className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100">
              <div className="flex items-center justify-between mb-8">
                <div className="flex items-center gap-3">
                  <h2 className="text-xl font-black italic tracking-tighter">{monthNames[currentDate.getMonth()]} {currentDate.getFullYear()}</h2>
                  <div className="flex gap-1">
                    <button onClick={() => changeMonth(-1)} className="p-2 hover:bg-slate-50 rounded-lg"><ChevronLeft size={16}/></button>
                    <button onClick={() => changeMonth(1)} className="p-2 hover:bg-slate-50 rounded-lg"><ChevronRight size={16}/></button>
                  </div>
                </div>
                <button className="p-3 bg-cyan-500 text-white rounded-2xl shadow-lg shadow-cyan-100"><Plus size={20} /></button>
              </div>
              
              <div className="grid grid-cols-7 gap-1 text-center mb-4">
                {['M','D','M','D','F','S','S'].map(d => <div key={d} className="text-[10px] font-black text-slate-300 py-2">{d}</div>)}
                
                {Array.from({ length: 42 }).map((_, i) => {
                  const dayNum = i - offset + 1;
                  const isCurrentMonth = dayNum > 0 && dayNum <= daysInMonth;
                  const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
                  const dayEvents = events.filter(e => e.date === dateStr);

                  return (
                    <div key={i} className={`aspect-square flex flex-col items-center justify-center rounded-2xl text-xs font-bold transition-all ${isCurrentMonth ? 'hover:bg-slate-50' : 'opacity-10'}`}>
                      {isCurrentMonth && (
                        <>
                          <span className={`${dayEvents.length > 0 ? 'text-cyan-600' : 'text-slate-500'}`}>{dayNum}</span>
                          {dayEvents.length > 0 && <div className="w-1 h-1 bg-cyan-500 rounded-full mt-1"></div>}
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="space-y-3">
              <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400 pl-4 flex items-center gap-2">
                <Clock size={12} /> Geplante Kampagnen
              </h3>
              {events.map(e => (
                <div key={e.id} className="bg-white p-5 rounded-3xl border border-slate-100 flex items-center gap-4 shadow-sm active:scale-98 transition-transform">
                  <div className={`w-3 h-3 rounded-full ${e.color}`}></div>
                  <div className="flex-1">
                    <p className="text-[9px] font-black text-slate-300 uppercase">{new Date(e.date).toLocaleDateString('de-DE', { day: '2-digit', month: 'long' })}</p>
                    <p className="text-sm font-bold">{e.title}</p>
                  </div>
                  <ChevronRight size={16} className="text-slate-200" />
                </div>
              ))}
            </div>
          </div>
        )}
      </main>

      {/* Navigation (Bottom for Mobile, Sidebar for Desktop) */}
      <nav className="fixed bottom-0 left-0 right-0 h-20 bg-white border-t border-slate-100 flex justify-around items-center z-50 md:top-0 md:bottom-0 md:w-20 md:flex-col md:bg-slate-900 md:border-none md:py-10">
        <button
          onClick={() => setActiveTab('instagram')}
          className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'instagram' ? 'text-cyan-500 md:text-white md:bg-cyan-500 md:p-4 md:rounded-2xl' : 'text-slate-300 md:text-slate-600'}`}
        >
          <Instagram size={26} />
          <span className="text-[8px] font-black uppercase md:hidden tracking-widest">Insta</span>
        </button>

        <button
          onClick={() => setActiveTab('generator')}
          className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'generator' ? 'text-cyan-500 md:text-white md:bg-cyan-500 md:p-4 md:rounded-2xl' : 'text-slate-300 md:text-slate-600'}`}
        >
          <Zap size={26} />
          <span className="text-[8px] font-black uppercase md:hidden tracking-widest">Generator</span>
        </button>

        <button
          onClick={() => setActiveTab('calendar')}
          className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'calendar' ? 'text-cyan-500 md:text-white md:bg-cyan-500 md:p-4 md:rounded-2xl' : 'text-slate-300 md:text-slate-600'}`}
        >
          <Calendar size={26} />
          <span className="text-[8px] font-black uppercase md:hidden tracking-widest">Planer</span>
        </button>
      </nav>

      {/* Tip Bubble */}
      {activeTab === 'generator' && !generatedPost && activeTab !== 'instagram' && (
        <div className="fixed bottom-24 left-4 right-4 bg-indigo-600 p-4 rounded-2xl text-white shadow-2xl flex items-center gap-3 animate-in slide-in-from-bottom-8 md:hidden">
          <div className="bg-white/20 p-2 rounded-xl"><Sparkles size={20} /></div>
          <p className="text-[10px] font-bold leading-tight uppercase tracking-wide">
            Lade ein Foto von der Terrasse hoch für eine blitzschnelle Analyse! 🐺✨
          </p>
        </div>
      )}

    </div>
  );
};

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
